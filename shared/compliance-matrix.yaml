# MCP Compliance Matrix — machine-readable source of truth.
# Sections 1-6: protocol, transports, capabilities, errors,
# progress_cancellation, log_schema. Sections 7-10 (surface, security,
# smoke_probes, inspector_commands) are appended in a subsequent change.
# Source of truth: 03-CONTEXT D-01..D-29 (checkpoint ID scheme, record
# shape, exit gate). Validated against shared/compliance-matrix.schema.json.

protocol:
  version: "2025-11-25"

transports:
  - id: "XPORT-01"
    level: "MUST"
    check: "stdio transport responds to initialize with a JSON-RPC result carrying protocolVersion, capabilities, and serverInfo; no error envelope on supported-version handshake"
    doc_anchor: "shared/docs/01-transport.md#initialize-handshake"
    code_anchor: "templates/typescript/src/transports/stdio.ts#StdioTransport"
    applies_to: ["stdio"]
    notes: ""
  - id: "XPORT-02"
    level: "MUST"
    check: "HTTP transport binds 127.0.0.1 by default; MCP_HTTP_HOST set to a non-loopback address emits a WARN log line at startup naming the bound address"
    doc_anchor: "shared/docs/01-transport.md#bind-address"
    code_anchor: "templates/typescript/src/transports/http.ts#bindHost"
    applies_to: ["streamable_http"]
    notes: ""
  - id: "XPORT-03"
    level: "MUST"
    check: "HTTP transport enforces an Origin allowlist: no-Origin requests pass, allowlisted Origins pass, unknown Origins are rejected with 403 Forbidden, empty allowlist means deny-all for browser clients"
    doc_anchor: "shared/docs/01-transport.md#origin-validation"
    code_anchor: "templates/typescript/src/security/origin.ts#originAllowlistMiddleware"
    applies_to: ["streamable_http"]
    notes: ""
  - id: "XPORT-04"
    level: "MUST"
    check: "HTTP GET /health returns 200 with body {status: 'ok', uptime_seconds: <integer>, protocol_version: '2025-11-25'} and no operator-internal fields (no dependency versions, env, hostnames)"
    doc_anchor: "shared/docs/01-transport.md#health-endpoint"
    code_anchor: "templates/typescript/src/http/health.ts#healthRoute"
    applies_to: ["streamable_http"]
    notes: ""
  - id: "XPORT-05"
    level: "MUST"
    check: "HTTP GET /.well-known/oauth-protected-resource returns an RFC 9728 stub JSON document including _DEV_STUB: true and a _DEV_WARNING field; the stub's full RFC 9728 shape is finalized in a later phase"
    doc_anchor: "shared/docs/01-transport.md#oauth-protected-resource-metadata"
    code_anchor: "templates/typescript/src/http/oauth-prm.ts#prmRoute"
    applies_to: ["streamable_http"]
    notes: ""
  - id: "XPORT-06"
    level: "MUST"
    check: "initialize negotiates protocolVersion (returns the supported version when client requests one; returns the server's highest supported version on mismatch; never errors on version mismatch) and emits the protocol_version_negotiated log event"
    doc_anchor: "shared/docs/01-transport.md#initialize-handshake"
    code_anchor: "templates/typescript/src/server.ts#protocolVersionNegotiated"
    notes: ""

capabilities:
  - id: "CAP-01"
    level: "MUST"
    check: "tools capability advertised as enabled at initialize"
    doc_anchor: "shared/docs/00-overview.md#per-template-contract-checklist"
    code_anchor: "templates/typescript/src/server.ts#capabilities"
    notes: ""
  - id: "CAP-02"
    level: "MUST"
    check: "resources capability advertised as enabled at initialize"
    doc_anchor: "shared/docs/00-overview.md#per-template-contract-checklist"
    code_anchor: "templates/typescript/src/server.ts#capabilities"
    notes: ""
  - id: "CAP-03"
    level: "MUST"
    check: "prompts capability advertised as enabled at initialize"
    doc_anchor: "shared/docs/00-overview.md#per-template-contract-checklist"
    code_anchor: "templates/typescript/src/server.ts#capabilities"
    notes: ""
  - id: "CAP-04"
    level: "MUST"
    check: "logging capability advertised as enabled at initialize"
    doc_anchor: "shared/docs/00-overview.md#per-template-contract-checklist"
    code_anchor: "templates/typescript/src/server.ts#capabilities"
    notes: ""
  - id: "CAP-05"
    level: "MUST"
    check: "listChanged advertised true for tools, resources, prompts"
    doc_anchor: "shared/docs/00-overview.md#per-template-contract-checklist"
    code_anchor: "templates/typescript/src/server.ts#capabilities"
    notes: ""

errors:
  - id: "ERR-01"
    level: "MUST"
    check: "Protocol-level failures use the JSON-RPC error envelope ({jsonrpc, id, error: {code, message, data?}}); never the tool-error envelope"
    doc_anchor: "shared/docs/03-observability.md#cancellation"
    code_anchor: "templates/typescript/src/server.ts#dispatchError"
    notes: ""
  - id: "ERR-02"
    level: "MUST"
    check: "Tool failures use the MCP tool-error envelope ({isError: true, content: [...]}); never the JSON-RPC error envelope"
    doc_anchor: "shared/docs/03-observability.md#cancellation"
    code_anchor: "templates/typescript/src/tools/add.ts#cancellationHandler"
    notes: "Cross-references SURF-NN cancel_envelope and PROG-02; aligns with D-11 byte-lock."

progress_cancellation:
  - id: "PROG-01"
    level: "MUST"
    check: "notifications/progress emitted with progressToken matching the inbound tools/call _meta.progressToken; one notification per progress_steps tick"
    doc_anchor: "shared/docs/03-observability.md#progress-notifications"
    code_anchor: "templates/typescript/src/tools/add.ts#emitProgress"
    notes: ""
  - id: "PROG-02"
    level: "MUST"
    check: "Final response delivered within MCP_CANCEL_GRACE_MS of inbound notifications/cancelled; handler must NOT skip the final response (Codex #20925)"
    doc_anchor: "shared/docs/03-observability.md#cancellation"
    code_anchor: "templates/typescript/src/tools/add.ts#cancellationHandler"
    notes: "See https://github.com/openai/codex/issues/20925 for the failure mode this checkpoint defends against."

log_schema:
  - id: "LOG-01"
    level: "MUST"
    check: "Logs written to stderr (fd 2) in stdio mode; never stdout"
    doc_anchor: "shared/docs/03-observability.md#log-destination"
    code_anchor: "templates/typescript/src/logger.ts#stderrSink"
    notes: ""
  - id: "LOG-02"
    level: "MUST"
    check: "Each log line is a single JSON object carrying the required top-level keys (ts, level, msg, request_id, component, transport, negotiated_protocol); tool_name present only during tool execution; extras nested under data:{}"
    doc_anchor: "shared/docs/03-observability.md#required-top-level-keys"
    code_anchor: "templates/typescript/src/logger.ts#logSchema"
    notes: ""
  - id: "LOG-03"
    level: "MUST"
    check: "ts is an ISO-8601 / RFC 3339 string with millisecond precision and trailing Z (UTC)"
    doc_anchor: "shared/docs/03-observability.md#required-top-level-keys"
    code_anchor: "templates/typescript/src/logger.ts#formatTimestamp"
    notes: ""
  - id: "LOG-04"
    level: "MUST"
    check: "level field is a lowercase string in {trace, debug, info, warn, error, fatal}; never numeric (Pino's default must be overridden)"
    doc_anchor: "shared/docs/03-observability.md#required-top-level-keys"
    code_anchor: "templates/typescript/src/logger.ts#levelEncoder"
    notes: ""
  - id: "LOG-05"
    level: "MUST"
    check: "request_id is a 26-character Crockford base32 ULID per https://github.com/ulid/spec"
    doc_anchor: "shared/docs/03-observability.md#required-top-level-keys"
    code_anchor: "templates/typescript/src/logger.ts#requestIdFactory"
    notes: "Closed STATE.md open decision: ULID format finalized."
  - id: "LOG-06"
    level: "MUST"
    check: "Canonical events emitted with locked field set: protocol_version_negotiated, request_started, request_completed, tool_call_started, tool_call_completed"
    doc_anchor: "shared/docs/03-observability.md#canonical-events"
    code_anchor: "templates/typescript/src/logger.ts#canonicalEvents"
    notes: ""
  - id: "LOG-07"
    level: "MUST"
    check: "All template-defined environment variables use the MCP_ prefix (single exception: STRICT_ENV); supersedes the shipped CONFIG-ENV-PREFIX placeholder"
    doc_anchor: "shared/docs/04-config-and-logging.md#naming-convention"
    code_anchor: "templates/typescript/src/config.ts#envPrefix"
    notes: ""
  - id: "LOG-08"
    level: "MUST"
    check: "Config validation is fail-fast at startup: a parse error causes the server to exit non-zero with a structured stderr line matching the log schema; supersedes the shipped CONFIG-STARTUP-VALIDATION placeholder"
    doc_anchor: "shared/docs/04-config-and-logging.md#startup-validation"
    code_anchor: "templates/typescript/src/config.ts#validateOrExit"
    notes: ""
  - id: "LOG-09"
    level: "MUST"
    check: "STRICT_ENV=1 rejects unknown MCP_* environment variables at startup with a structured stderr error; supersedes the shipped CONFIG-STRICT-ENV placeholder"
    doc_anchor: "shared/docs/04-config-and-logging.md#startup-validation"
    code_anchor: "templates/typescript/src/config.ts#strictEnvGuard"
    notes: ""
  - id: "LOG-10"
    level: "MUST"
    check: "Logger primary sink is stderr (fd 2) by default; HTTP mode MAY tee to MCP_LOG_FILE; supersedes the shipped LOG-SINK-STDERR-DEFAULT placeholder"
    doc_anchor: "shared/docs/04-config-and-logging.md#logger-sink-behavior"
    code_anchor: "templates/typescript/src/logger.ts#sinkRouter"
    notes: ""
  - id: "LOG-11"
    level: "MUST"
    check: "stdout sink prohibited in stdio mode (no console.log / process.stdout.write call may reach fd 1); supersedes the shipped LOG-SINK-NO-STDOUT-STDIO placeholder"
    doc_anchor: "shared/docs/04-config-and-logging.md#stdio-mode"
    code_anchor: "templates/typescript/src/transports/stdio.ts#stdoutGuard"
    notes: ""
